stages:
  - test
  - deploy

test:
  image: php:8.1-cli
  stage: test
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libsqlite3-dev unzip git
    - docker-php-ext-install pdo_sqlite
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-progress --no-interaction
  script:
    - composer test

deploy:
  image: curlimages/curl:latest
  only:
    - tags
  stage: deploy
  variables:
    URL: "${CI_API_V4_URL}/projects/$CI_PROJECT_ID/packages/composer"
  script:
    - 'curl -sS --show-error --fail  --header "Deploy-Token: $DEPLOY_TOKEN" --data tag=${CI_COMMIT_TAG} $URL'
